name: Deploy to staging

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API Worker (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Placeholder: requires CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets
      # and provisioned Cloudflare resources (D1, R2, KV, Queues) referenced in
      # apps/api/wrangler.toml. Founder must populate placeholders before this runs.
      - name: Deploy API to staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --env staging

  deploy-web:
    name: Deploy web Pages (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @app/web build

      # Placeholder — wire up Pages deploy once the project name is provisioned.
      - name: Deploy web to Cloudflare Pages (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          # REPLACE_WITH_STAGING_PAGES_PROJECT_NAME below
          command: pages deploy .next --project-name=REPLACE_WITH_STAGING_PAGES_PROJECT_NAME --branch=staging

  deploy-admin:
    name: Deploy admin Pages (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: pnpm --filter @app/admin build

      - name: Deploy admin to Cloudflare Pages (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/admin
          # REPLACE_WITH_STAGING_ADMIN_PAGES_PROJECT_NAME below
          command: pages deploy .next --project-name=REPLACE_WITH_STAGING_ADMIN_PAGES_PROJECT_NAME --branch=staging
