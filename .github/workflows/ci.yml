name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Enforces the backend ≥70% line-coverage gate from
      # tests/vitest.config.ts. Frontend gate is intentionally absent
      # (see DECISIONS.md "Frontend ≥50% coverage gate waived for V1 launch").
      - name: Coverage gate
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
