name: Preview deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview-web:
    name: Cloudflare Pages preview (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @app/web build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy .next --project-name=REPLACE_WITH_STAGING_PAGES_PROJECT_NAME --branch=pr-${{ github.event.number }}

  preview-admin:
    name: Cloudflare Pages preview (admin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @app/admin build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/admin
          command: pages deploy .next --project-name=REPLACE_WITH_STAGING_ADMIN_PAGES_PROJECT_NAME --branch=pr-${{ github.event.number }}
